name: Build Electron Distribution

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types:
      - published

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build distributable
        run: npm run dist

      - name: Upload workflow artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: maple-union-installer
          path: release/*

      - name: Upload to GitHub Release
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: release/*
          fail_on_unmatched_files: true
